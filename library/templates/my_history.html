<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>My Borrow History</h1>

    <ul>
      {% for record in records %}

      <li>
        {{ record.book.title }}

        <br />

        Borrowed On: {{ record.borrowed_at|date:"d M Y H:i" }}

        <br />

        Status: {% if record.returned %} Returned {% else %} Active {% endif %}
      </li>

      <br />

      {% endfor %}
    </ul>

    <a href="/">Back to Home</a>
  </body>
</html>
