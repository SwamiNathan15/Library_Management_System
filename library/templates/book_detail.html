<!doctype html>
<html>
  <head>
    <title>{{ book.title }}</title>
  </head>

  <body>
    <a href="/">← Back to Library</a>

    <h1>{{ book.title }}</h1>

    <p>Author: {{ book.author }}</p>

    <p>Price: ₹{{ book.price }}</p>

    {% if book.is_available %}

    <p>Status: Available ✅</p>

    <a href="/borrow/{{ book.id }}/"> Borrow Book </a>

    {% else %}

    <p>Status: Borrowed ❌</p>

    {% endif %}
  </body>
</html>
